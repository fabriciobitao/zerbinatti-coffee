version: 2
updates:
  # ────────────────────────────────────────────────────────
  # npm — patch/minor agrupados; major separados; security imediato.
  # ────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      # Atualizações minor/patch agrupadas em UM PR para reduzir ruído.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        # Não agrupar Next/React (mudanças de breaking comuns em minor)
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@sentry/*"
      # Sentry separado — versionamento próprio
      sentry:
        applies-to: version-updates
        patterns:
          - "@sentry/*"

  # PRs de segurança ficam fora dos grupos (chegam imediatamente).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "fix(security)"
      include: "scope"
    # Apenas PRs de security advisory.
    allow:
      - dependency-type: "all"
        update-type: "security"

  # ────────────────────────────────────────────────────────
  # GitHub Actions
  # ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
